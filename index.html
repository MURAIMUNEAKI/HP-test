<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>おしゃれなステーキ屋さん</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <style>
        body, html { margin:0; padding:0; height:100%; overflow:hidden; font-family:'Noto Sans JP',sans-serif; }
        body { display:flex; flex-direction:column; height:100vh; }
        .header { background:#1a2744; color:#fff; padding:14px 20px; font-size:18px; font-weight:700; flex-shrink:0; }
        .settings-panel {
            background: #f0f4f8;
            padding: 14px 20px;
            border-bottom: 2px solid #333;
            flex-shrink: 0;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        .settings-panel label { font-size: 14px; font-weight: 700; color: #1a2744; margin-right: 4px; }
        .settings-panel input, .settings-panel select {
            font-size: 15px; padding: 10px 14px; border: 2px solid #000; border-radius: 6px;
            background: #fff; min-width: 120px; outline: none; font-family: inherit;
        }
        .settings-panel input:focus, .settings-panel select:focus { border-color: #533483; box-shadow: 0 0 0 2px rgba(83, 52, 131, 0.15); }
        .chat-area { flex:1; overflow-y:auto; padding:16px; background:#fafafa; }
        .input-bar { flex-shrink:0; display:flex; align-items:flex-end; gap:8px; padding:12px 16px; background:#fff; border-top:1px solid #e0e0e0; }
        textarea#chatInput { flex:1; border:2px solid #d0d0d0; border-radius:24px; padding:10px 16px; resize:none; font-size:15px; font-family:inherit; max-height:120px; outline:none; }
        textarea#chatInput:focus { border-color:#533483; }
        button#sendBtn { width:48px; height:48px; border-radius:50%; background:linear-gradient(135deg,#0f3460,#533483,#e94560); color:#fff; border:none; cursor:pointer; font-size:20px; flex-shrink:0; }
        .message { display:flex; gap:8px; margin-bottom:14px; max-width:80%; align-items:flex-start; }
        .message.user { margin-left:auto; flex-direction:row-reverse; }
        .message.ai { margin-right:auto; }
        .icon { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
        .message.user .icon { background:#0f3460; color:#fff; }
        .message.ai .icon { background:#e8eaf6; }
        .bubble { padding:10px 16px; border-radius:18px; line-height:1.7; word-break:break-word; font-size:14px; }
        .message.user .bubble { background:#0f3460; color:#fff; border-bottom-right-radius:4px; }
        .message.ai .bubble { background:#fff; color:#333; border:1px solid #e0e0e0; border-bottom-left-radius:4px; }
        .time { font-size:11px; color:#aaa; margin-top:4px; }
        .typing-indicator { padding:10px; font-style:italic; color:#888; }
        @media(max-width:600px) { .message { max-width:90%; } }
    </style>
</head>
<body>
    <div class="header">おしゃれなステーキ屋さん</div>
    <div class="settings-panel">
        <div><label>肉の種類</label><select id="meat"><option>牛</option><option>豚</option><option>鳥</option></select></div>
        <div><label>味</label><input type="text" id="taste" placeholder="塩胡椒"></div>
        <div><label>辛さ</label><input type="text" id="spice" placeholder="普通"></div>
    </div>
    <div class="chat-area" id="chatArea"></div>
    <div class="input-bar">
        <textarea id="chatInput" rows="1" placeholder="メッセージを入力..."></textarea>
        <button id="sendBtn">➤</button>
    </div>

    <script>
        const API_URL = 'api.php';
        let currentUid = '';
        let isFirstMessage = true;
        const chatArea = document.getElementById('chatArea');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            const html = role === 'ai' ? renderMarkdown(text) : esc(text);
            div.innerHTML = `<div class="icon">${role==='user'?'👤':'🤖'}</div><div class="bubble">${html}<div class="time">${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div></div>`;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function renderMarkdown(text) {
            let html = text.replace(/^### (.*$)/gim, '<h3>$1</h3>')
                           .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                           .replace(/\*\*(.*)\*\*/g, '<strong>$1</strong>')
                           .replace(/\*(.*)\*/g, '<em>$1</em>')
                           .replace(/\n/g, '<br>');
            return DOMPurify.sanitize(html);
        }

        function esc(str) { return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;
            addMessage('user', text);
            chatInput.value = '';
            chatInput.style.height = 'auto';
            sendBtn.disabled = true;

            const typing = document.createElement('div');
            typing.className = 'typing-indicator';
            typing.innerText = '入力中...';
            chatArea.appendChild(typing);

            const payload = isFirstMessage ? {
                message: text, uid: '',
                settings: { meat: document.getElementById('meat').value, taste: document.getElementById('taste').value || '塩胡椒', spice: document.getElementById('spice').value || '普通' }
            } : { message: text, uid: currentUid };

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                const data = await res.json();
                if (data.ok) {
                    addMessage('ai', data.answer);
                    currentUid = data.uid;
                    isFirstMessage = false;
                }
            } catch (e) { addMessage('ai', 'エラーが発生しました。'); }
            typing.remove();
            sendBtn.disabled = false;
        }

        chatInput.addEventListener('input', () => { chatInput.style.height = 'auto'; chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px'; });
        chatInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
        sendBtn.addEventListener('click', sendMessage);

        window.addEventListener('DOMContentLoaded', () => {
            addMessage('ai', 'こんにちは！上の「肉の種類」「味」「辛さ」を選んでから、メッセージを送ってください。一緒に最高のステーキについてお話ししましょう！');
        });
    </script>
</body>
</html>
